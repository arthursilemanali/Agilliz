name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build, Clean Up, Run JAR, and Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn install -DskipTests

      - name: Rename JAR file
        id: rename_jar
        run: |
          JAR_NAME="projetoAgiliz.jar"
          NEW_JAR=$(find target -name "*.jar" | head -n 1)
          if [ -n "$NEW_JAR" ]; then
            mv "$NEW_JAR" "target/$JAR_NAME"
          else
            echo "No JAR file found!"
            exit 1
          fi

      - name: Clean up old JAR files
        run: |
          for jar in target/*.jar; do
            if [ "$jar" != "target/projetoAgiliz.jar" ]; then
              echo "Removing old JAR file: $jar"
              rm "$jar"
            fi
          done

      - name: Verify JAR file
        run: ls target/projetoAgiliz.jar

      - name: Build Docker image
        run: docker build -t uglukthedingy/agiliz:latest .

      - name: Push Docker image
        run: docker push uglukthedingy/agiliz:latest

  deploy:
    needs: build
    name: Deploy to Production
    runs-on: [self-hosted, production]

    steps:
      - name: Log in to DockerHub
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Pull image from DockerHub
        run: sudo docker pull uglukthedingy/agiliz:latest

      - name: Remove existing container (if any)
        run: |
          if sudo docker ps -a --format '{{.Names}}' | grep -q '^deploy_prod$'; then
            echo "Removing existing container..."
            sudo docker rm -f deploy_prod
          fi

      - name: Check if port 8080 is free
        run: |
          if sudo lsof -i:8080; then
            echo "Port 8080 is in use, removing conflicting processes..."
            sudo fuser -k 8080/tcp || true
          else
            echo "Port 8080 is free."
          fi

      - name: Run Docker container
        run: |
          echo "Starting Docker container..."
          sudo docker run -d -p 8080:8080 \
            -e DATABASE_URL=${{ secrets.DATABASE_URL_PRODUCTION }} \
            -e DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME_PRODUCTION }} \
            -e DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD_PRODUCTION }} \
            --name deploy_prod uglukthedingy/agiliz:latest

      - name: Verify running containers
        run: sudo docker ps

      - name: Check container logs
        run: sudo docker logs deploy_prod